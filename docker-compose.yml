services:
  postgres:
    image: postgres:16-alpine
    container_name: event-summary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-n8ndb.sh:/docker-entrypoint-initdb.d/init-n8ndb.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-summary-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eventdb?schema=public
      PORT: 3000
    ports:
      - "3000:3000"

  n8n:
    image: n8nio/n8n:latest
    container_name: event-summary-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8ndb
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=postgres
      - GENERIC_TIMEZONE=Asia/Tokyo
      - N8N_DIAGNOSTICS_ENABLED=false
      # n8n から Event API へのアクセス用
      - EVENT_API_URL=http://event-summary-api:3000
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"

volumes:
  postgres_data:
  n8n_data:
