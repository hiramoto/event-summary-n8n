services:
  postgres:
    image: postgres:16-alpine
    container_name: event-summary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-summary-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eventdb?schema=public
      PORT: 3000
    ports:
      - "3000:3000"

  postgres-init:
    image: postgres:16-alpine
    container_name: event-summary-postgres-init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command:
      - sh
      - -c
      - |
        psql -h postgres -U postgres -d postgres -c "CREATE DATABASE n8ndb;" ||
        psql -h postgres -U postgres -d postgres -c "SELECT 'n8ndb already exists';"

  n8n:
    image: n8nio/n8n:1.94.1
    container_name: event-summary-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8ndb
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: postgres
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_BLOCK_ENV_ACCESS: ${N8N_BLOCK_ENV_ACCESS:-false}
      TZ: Asia/Tokyo
      ZEROCLAW_GATEWAY_TOKEN: ${ZEROCLAW_GATEWAY_TOKEN}
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  zeroclaw:
    build:
      context: ./zeroclaw
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    #command: ["zeroclaw", "channel", "start"]
    command: ["zeroclaw", "daemon", "--port", "42617"]
    restart: unless-stopped
    volumes:
      - zeroclaw_data:/home/zeroclaw/.zeroclaw
      - ./zeroclaw/identity.md:/etc/zeroclaw/IDENTITY.md:ro
      - zeroclaw_workspace:/workspace
    expose:
      - "42617"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - postgres

volumes:
  postgres_data:
  n8n_data:
  zeroclaw_data:
  zeroclaw_workspace:
